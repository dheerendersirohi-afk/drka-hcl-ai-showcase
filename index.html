<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>DRKA(HCL) Preview Stopped</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Georgia, "Times New Roman", serif;
        background: #f4efe7;
        color: #171411;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 25% 20%, rgba(202, 95, 44, 0.18), transparent 32rem),
          linear-gradient(135deg, #f8f1e8 0%, #dfe8df 100%);
      }

      main {
        width: min(720px, calc(100vw - 40px));
        padding: 48px;
        border: 1px solid rgba(23, 20, 17, 0.14);
        border-radius: 28px;
        background: rgba(255, 252, 247, 0.82);
        box-shadow: 0 24px 70px rgba(36, 28, 18, 0.16);
      }

      p {
        font-size: 18px;
        line-height: 1.6;
      }

      .eyebrow {
        margin: 0 0 14px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 0.95;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">DRKA(HCL)</p>
      <h1>Public preview stopped</h1>
      <p>
        This showcase preview has been intentionally paused by the project owner.
        Source code and configuration are preserved locally and can be restored when needed.
      </p>
